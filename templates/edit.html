<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <title>Habit Tracker</title>
</head>
<body>
    <h1>My habits</h1>
    <p>
        Edit your habit: {{ habit['name'] }}
    </p>
    <form method="post">
        <input type="hidden" name="id" value="{{ habit['id'] }}">
        <input name="name" placeholder="Habit name" value="{{ habit['name'] }}" required>
        <button type="submit">Change</button>
    </form>
</body>
</html>
